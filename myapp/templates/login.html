<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Chef's Palette</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
        
        :root {
            --bg-dark: #0B0F19;
            --bg-card: rgba(17, 24, 39, 0.7);
            --bg-card-hover: rgba(31, 41, 55, 0.8);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #F59E0B; /* Amber/Orange accent */
            --text-main: #F3F4F6;
            --text-muted: #9CA3AF;
            --shadow-md: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 480px;
            box-shadow: var(--shadow-md);
        }

        .auth-title {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            color: #FFF;
            margin-bottom: 2rem;
            text-align: center;
        }

        .auth-title span {
            color: var(--primary);
        }

        .form-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .form-control {
            background: rgba(11, 15, 25, 0.6);
            border: 1.5px solid var(--border-color);
            color: #FFF !important;
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            font-size: 0.95rem;
        }

        .form-control:focus {
            background: rgba(11, 15, 25, 0.8);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15);
        }

        .btn-gold {
            background: var(--primary);
            color: var(--bg-dark);
            font-weight: 600;
            padding: 0.8rem;
            border-radius: 12px;
            width: 100%;
            border: none;
            transition: all 0.3s;
            margin-top: 1.5rem;
        }

        .btn-gold:hover {
            background: #D97706;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.25);
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2 class="auth-title"><i class="fas fa-pizza-slice me-2 text-warning"></i>Chef's<span>Palette</span></h2>
        
        <!-- Alerts -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} py-2 px-3 border-0 rounded-3 mb-4" role="alert" style="font-size: 0.9rem;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="/login/">
            {% csrf_token %}
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" name="username" id="username" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-gold">Sign In</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="/register/">Sign Up</a>
            <br>
            <a href="/" class="d-inline-block mt-3 text-muted"><i class="fas fa-arrow-left me-1"></i> Back to Explore</a>
        </div>
    </div>
</body>
</html>
